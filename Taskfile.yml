# https://taskfile.dev  —  requires Task ≥ 3.28
version: '3'

includes:
  api:
    taskfile: ./cantica-api/Taskfile.yml
    dir: ./cantica-api
  web:
    taskfile: ./cantica-web/Taskfile.yml
    dir: ./cantica-web
  studio:
    taskfile: ./cantica-studio/Taskfile.yml
    dir: ./cantica-studio
  secure:
    taskfile: ./cantica-secure/Taskfile.yml
    dir: ./cantica-secure

# ── Default ────────────────────────────────────────────────────────────────
tasks:
  default:
    desc: List all available tasks
    silent: true
    cmd: task --list

  # ── Combined workflows ────────────────────────────────────────────────────
  check:
    desc: Run all quality gates across API and frontend
    cmds:
      - task: api:check
      - task: web:check
      - task: studio:check
      - task: secure:check

  fix:
    desc: Auto-fix all lint issues and reformat across API and frontend
    cmds:
      - task: api:fix
      - task: web:fix
      - task: studio:fix

  dev:
    desc: Start the full development environment (API + UI concurrently)
    deps:
      - task: api:serve
      - task: web:dev

  ci:
    desc: Full CI pipeline for all sub-projects
    cmds:
      - task: api:ci
      - task: web:ci
      - task: studio:ci
      - task: secure:ci

  # ── Docker Compose ───────────────────────────────────────────────────────

  up:
    desc: Start all containers (detached)
    cmd: docker compose up -d

  down:
    desc: Stop and remove all containers
    cmd: docker compose down

  build:
    desc: Build all Docker images without starting
    cmd: docker compose build

  rebuild:
    desc: Rebuild all images (no cache) and restart containers
    cmds:
      - docker compose build --no-cache
      - docker compose up -d

  restart:
    desc: Restart all running containers
    cmd: docker compose restart

  restart:api:
    desc: Rebuild and restart only the api container
    cmds:
      - docker compose build api
      - docker compose up -d --no-deps api

  restart:web:
    desc: Rebuild and restart only the web container
    cmds:
      - docker compose build web
      - docker compose up -d --no-deps web

  logs:
    desc: Follow logs for all containers
    cmd: docker compose logs -f

  logs:api:
    desc: Follow api container logs
    cmd: docker compose logs -f api

  logs:web:
    desc: Follow web container logs
    cmd: docker compose logs -f web

  ps:
    desc: Show container status
    cmd: docker compose ps

  # ── Clean ─────────────────────────────────────────────────────────────────
  clean:
    desc: Remove build artefacts and caches across all sub-projects
    cmds:
      - task: api:clean
      - task: web:clean
      - task: studio:clean
      - task: secure:clean

  clean:all:
    desc: Remove everything including venvs and node_modules across all sub-projects
    cmds:
      - task: api:clean:all
      - task: web:clean:all
      - task: studio:clean:all
      - task: secure:clean:all
